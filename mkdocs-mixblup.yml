site_name: MiXBLUP Manual
site_url: https://mirjamspd.github.io/MiXBLUP/
extra_css:
  - stylesheets/mixblup.css

theme:
  name: material
  custom_dir: overrides-mixblup
  features:
    - navigation.indexes
    - navigation.sections
    - toc.integrate

nav:
  #- Home: index.md
  - Home: manual_cleaned.md

markdown_extensions:
- attr_list
- toc:
    permalink: true
- tables
- fenced_code

plugins:
  - search
